<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root { color-scheme: light dark; }
  body { width: 460px; margin: 0; font: 13px/1.4 system-ui, sans-serif; }
  #q { width: 100%; box-sizing: border-box; padding: 10px 12px; border: 0;
       border-bottom: 1px solid rgba(128,128,128,0.3); background: transparent;
       color: inherit; font: inherit; outline: none; }
  #bar { display: flex; align-items: center; justify-content: space-between;
         padding: 6px 12px; border-bottom: 1px solid rgba(128,128,128,0.18);
         font-size: 12px; color: rgba(128,128,128,0.95); }
  #bar label { display: inline-flex; align-items: center; gap: 4px; cursor: pointer; }
  #bar a { color: inherit; text-decoration: none; cursor: pointer; }
  #bar a:hover { text-decoration: underline; }
  #list { list-style: none; padding: 0; margin: 0; max-height: 440px; overflow-y: auto; }
  #list li { padding: 8px 12px; cursor: pointer; display: flex; align-items: baseline;
             gap: 10px; border-bottom: 1px solid rgba(128,128,128,0.12); }
  #list li:hover { background: rgba(100,150,255,0.15); }
  .port { font-weight: 600; font-variant-numeric: tabular-nums; min-width: 60px; }
  .proc { flex: 1; }
  .addr { color: rgba(128,128,128,0.8); font-size: 11px; }
  #status { padding: 14px; color: rgba(128,128,128,0.9); text-align: center; }
  .error { color: #c33; }
</style>
</head>
<body>
  <input id="q" placeholder="Filter by port or process… (Enter opens first)" autofocus>
  <div id="bar">
    <span id="count"></span>
    <span>
      <label><input type="checkbox" id="showAll"> Show all</label>
      &nbsp;·&nbsp;
      <a id="settings" href="#">Settings</a>
    </span>
  </div>
  <ul id="list"></ul>
  <div id="status">Loading…</div>
  <script src="popup.js"></script>
</body>
</html>
