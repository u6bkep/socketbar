name: build-release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt,clippy
          rustup override set stable
      - name: cargo fmt
        working-directory: host
        run: cargo fmt --all -- --check
      - name: cargo clippy
        working-directory: host
        run: cargo clippy --all-targets --release -- -D warnings

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup toolchain install stable --profile minimal
      - name: cargo test
        working-directory: host
        run: cargo test --release

  build-host:
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - x86_64-unknown-linux-musl
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add ${{ matrix.target }}
      - name: Install musl tools
        if: endsWith(matrix.target, '-musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - name: Build
        working-directory: host
        run: cargo build --release --target ${{ matrix.target }}
      - name: Stage artifact
        run: |
          mkdir -p dist
          cp host/target/${{ matrix.target }}/release/socketbar-host dist/socketbar-host-${{ matrix.target }}
      - uses: actions/upload-artifact@v4
        with:
          name: host-${{ matrix.target }}
          path: dist/socketbar-host-${{ matrix.target }}
          if-no-files-found: error

  package-extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate manifest
        run: python3 -c "import json; json.load(open('extension/manifest.json'))"
      - name: Read version
        id: version
        run: echo "version=$(python3 -c 'import json; print(json.load(open(\"extension/manifest.json\"))[\"version\"])')" >> "$GITHUB_OUTPUT"
      - name: Package .xpi
        run: |
          mkdir -p dist
          cd extension
          zip -r -FS "../dist/socketbar-${{ steps.version.outputs.version }}.xpi" . \
            -x "*.DS_Store" "*/.*"
      - uses: actions/upload-artifact@v4
        with:
          name: extension-unsigned
          path: dist/socketbar-*.xpi
          if-no-files-found: error

  sign-extension:
    needs: package-extension
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install -g web-ext
      - name: Sign via AMO (unlisted)
        working-directory: extension
        run: |
          mkdir -p ../dist-signed
          web-ext sign --channel=unlisted \
            --api-key="${{ secrets.AMO_JWT_ISSUER }}" \
            --api-secret="${{ secrets.AMO_JWT_SECRET }}" \
            --artifacts-dir=../dist-signed
      - uses: actions/upload-artifact@v4
        with:
          name: extension-signed
          path: dist-signed/*.xpi
          if-no-files-found: error

  release:
    needs: [lint, test, build-host, package-extension, sign-extension]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Stage release
        run: |
          mkdir -p release
          # Prefer the signed .xpi; fall back to unsigned if signing didn't run.
          if compgen -G "artifacts/extension-signed/*.xpi" > /dev/null; then
            cp artifacts/extension-signed/*.xpi release/
          else
            cp artifacts/extension-unsigned/*.xpi release/
          fi
          find artifacts -type f -name 'socketbar-host-*' -exec cp {} release/ \;
          ls -la release/
      - uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          fail_on_unmatched_files: true
